name: Generate Garmin Secret

on:
  workflow_dispatch:
    inputs:
      email:
        description: "你的佳明账号邮箱"
        required: true
      password:
        description: "你的佳明密码"
        required: true
      is_cn:
        description: "是否为国行账号？(国际区请务必不要勾选)"
        required: true
        type: boolean
        default: false

jobs:
  get_secret:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp

      - name: Connect Cloudflare WARP
        run: |
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp
          warp-cli --accept-tos connect
          echo "等待 WARP 连接..."
          sleep 5
          warp-cli --accept-tos status
          curl -s https://cloudflare.com/cdn-cgi/trace | grep -E "ip|warp"

      - name: Get Secret
        run: |
          if [ "${{ github.event.inputs.is_cn }}" = "true" ]; then
             python run_page/get_garmin_secret.py "${{ github.event.inputs.email }}" "${{ github.event.inputs.password }}" --is-cn
          else
             python run_page/get_garmin_secret.py "${{ github.event.inputs.email }}" "${{ github.event.inputs.password }}"
          fi

      - name: Disconnect Cloudflare WARP
        if: always()
        run: |
          warp-cli --accept-tos disconnect
